name: 娱乐直播竞品周报

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install anthropic requests

      - name: 执行报告生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEISHU_WEBHOOK_1: ${{ secrets.FEISHU_WEBHOOK_1 }}
          FEISHU_WEBHOOK_2: ${{ secrets.FEISHU_WEBHOOK_2 }}
          GITHUB_REPO: ${{ github.repository }}
        run: python report.py

      - name: 提交 docs 到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📊 更新竞品周报 $(date +'%Y-%m-%d')"
          git push

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

  deploy:
    needs: run-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps
